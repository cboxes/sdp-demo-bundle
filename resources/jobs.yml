resources:

  jobs:

    sdp_pipeline:

      name: SDP Demo Pipeline

      tasks:

        - task_key: setup

          notebook_task:
            notebook_path: ../notebooks/00_setup_lakehouse.ipynb

        - task_key: bronze

          depends_on:
            - task_key: setup

          notebook_task:
            notebook_path: ../notebooks/01_bronze_ingestion.ipynb

        - task_key: silver

          depends_on:
            - task_key: bronze

          notebook_task:
            notebook_path: ../notebooks/02_silver_transformations.ipynb

        - task_key: gold

          depends_on:
            - task_key: silver

          notebook_task:
            notebook_path: ../notebooks/03_gold_models.ipynb

        - task_key: semantic

          depends_on:
            - task_key: gold

          notebook_task:
            notebook_path: ../notebooks/04_semantic_layer.ipynb